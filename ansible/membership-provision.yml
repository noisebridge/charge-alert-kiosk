---
- name: Configure membership-alerts kiosk display
  hosts: membership_kiosks
  pre_tasks:
    - name: Write SSH private key
      ansible.builtin.copy:
        content: "{{ vault_membership_ssh_private_key }}"
        dest: ~/.ssh/membership-alerts
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true
  roles:
    - membership-kiosk
