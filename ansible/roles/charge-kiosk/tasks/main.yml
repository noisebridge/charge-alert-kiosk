---
- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist

- name: Install kiosk packages
  ansible.builtin.apt:
    name:
      - cage
      - curl
      - firefox
      - wlr-randr
      - wtype
    state: present

- name: Ensure Firefox policies directory exists
  ansible.builtin.file:
    path: /etc/firefox/policies
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Firefox policies
  ansible.builtin.template:
    src: policies.json.j2
    dest: /etc/firefox/policies/policies.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart kiosk

- name: Deploy kiosk script
  ansible.builtin.template:
    src: kiosk.sh.j2
    dest: /home/{{ kiosk_user }}/kiosk.sh
    owner: "{{ kiosk_user }}"
    group: "{{ kiosk_user }}"
    mode: "0755"
  notify: Restart kiosk

- name: Deploy kiosk systemd service
  ansible.builtin.template:
    src: kiosk.service.j2
    dest: /etc/systemd/system/kiosk.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart kiosk

- name: Remove old fbcon value from cmdline.txt
  ansible.builtin.replace:
    path: /boot/firmware/cmdline.txt
    regexp: '\s*fbcon=rotate:\S*'
    replace: ''
  changed_when: false

- name: Append fbcon=rotate to cmdline.txt
  ansible.builtin.lineinfile:
    path: /boot/firmware/cmdline.txt
    regexp: '^(.+)$'
    line: '\1 fbcon=rotate:{{ kiosk_fbcon_rotate }}'
    backrefs: true

- name: Set CPU overclock frequency
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: '^#?arm_freq='
    line: "arm_freq={{ kiosk_arm_freq }}"
  notify: Reboot

- name: Set GPU overclock frequency
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: '^#?gpu_freq='
    line: "gpu_freq={{ kiosk_gpu_freq }}"
  notify: Reboot

- name: Set overclock voltage delta
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: '^#?over_voltage_delta='
    line: "over_voltage_delta={{ kiosk_over_voltage_delta }}"
  notify: Reboot

- name: Enable and start kiosk service
  ansible.builtin.systemd:
    name: kiosk
    enabled: true
    state: started
    daemon_reload: true

- name: Schedule daily reboot at 4am
  ansible.builtin.cron:
    name: "Daily reboot"
    minute: "0"
    hour: "4"
    job: "/sbin/reboot"
    user: root

- name: Enable SPI
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: '^#?dtparam=spi='
    line: "dtparam=spi=on"
  notify: Reboot

# --- RGB LED server ---

- name: Install build-essential for compiling neopixel
  ansible.builtin.apt:
    name: build-essential
    state: present

- name: Copy neopixel.c to host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../rgb-server/neopixel.c"
    dest: /tmp/neopixel.c
    mode: "0644"

- name: Compile libneopixel.so
  ansible.builtin.command:
    cmd: gcc -shared -o /usr/local/lib/libneopixel.so -fPIC /tmp/neopixel.c
  register: neopixel_compile
  changed_when: neopixel_compile.rc == 0
  notify:
    - Run ldconfig
    - Restart rgb-server

- name: Build rgb-server binary
  ansible.builtin.command:
    cmd: bun run build
    chdir: "{{ playbook_dir }}/../rgb-server"
  delegate_to: localhost
  become: false
  register: rgb_build
  changed_when: rgb_build.rc == 0

- name: Copy rgb-server binary
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../rgb-server/dist/rgb-server"
    dest: /usr/local/bin/rgb-server
    owner: root
    group: root
    mode: "0755"
  notify: Restart rgb-server

- name: Deploy rgb-server systemd service
  ansible.builtin.template:
    src: rgb-server.service.j2
    dest: /etc/systemd/system/rgb-server.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart rgb-server

- name: Enable and start rgb-server
  ansible.builtin.systemd:
    name: rgb-server
    enabled: true
    state: started
    daemon_reload: true
