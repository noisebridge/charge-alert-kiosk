---
- name: Configure charge alerts kiosk display
  hosts: charge_kiosks
  pre_tasks:
    - name: Write SSH private key
      ansible.builtin.copy:
        content: "{{ vault_ssh_private_key }}"
        dest: ~/.ssh/charge-alerts
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true
  roles:
    - charge-kiosk
